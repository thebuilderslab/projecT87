<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeFi Agent Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .network-status {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
        }

        .wallet-info {
            background: rgba(255, 107, 107, 0.1);
            border-left: 4px solid #ff6b6b;
        }

        .aave-status {
            background: rgba(78, 205, 196, 0.1);
            border-left: 4px solid #4ecdc4;
        }

        .controls {
            margin-top: 30px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin: 0 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }

        .btn.emergency {
            background: linear-gradient(45deg, #ff6b6b, #cc0000);
        }

        .btn.emergency:hover {
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #4ecdc4;
        }

        .warning {
            color: #ffa726;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>🤖 DeFi Agent Dashboard</h1>
            <p>Autonomous Arbitrum DeFi Operations</p>
        </div>

        <div class="status-grid">
            <div class="status-card network-status">
                <div class="card-title">
                    🌐 Network Status
                </div>
                <div class="card-value" id="network-name">
                    <span class="loading"></span> Loading...
                </div>
                <div class="card-subtitle" id="network-details">
                    Connecting to blockchain...
                </div>
            </div>

            <div class="status-card wallet-info">
                <div class="card-title">
                    💰 Wallet Info
                </div>
                <div class="card-value" id="wallet-address">
                    <span class="loading"></span> Loading...
                </div>
                <div class="card-subtitle" id="wallet-balance">
                    ETH: -- | USDC: --
                </div>
            </div>

            <div class="status-card aave-status">
                <div class="card-title">
                    🏦 Aave Protocol
                </div>
                <div class="card-value" id="health-factor">
                    <span class="loading"></span> Loading...
                </div>
                <div class="card-subtitle" id="aave-details">
                    Collateral: -- | Debt: --
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="refreshData()">🔄 Refresh</button>
            <button class="btn emergency" onclick="emergencyStop()">🚨 Emergency Stop</button>
        </div>

        <div class="footer">
            <p>🛡️ System Status: <span id="system-status">Operational</span></p>
            <p>Last Updated: <span id="last-updated">--</span></p>
        </div>
    </div>

    <script>
        let updateInterval;

        function formatNumber(num, decimals = 6) {
            if (typeof num !== 'number' || isNaN(num)) return '0.000000';
            return num.toFixed(decimals);
        }

        function formatAddress(address) {
            if (!address || address === 'Unknown' || address === 'Error') return address;
            return `${address.slice(0, 6)}...${address.slice(-4)}`;
        }

        async function fetchData() {
            try {
                console.log('Fetching wallet status...');

                const response = await fetch('/api/wallet_status');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                console.log('Received data:', data);

                updateUI(data);

            } catch (error) {
                console.error('Error fetching data:', error);
                showError('Connection failed: ' + error.message);
            }
        }

        function updateUI(data) {
            try {
                // Network Status
                document.getElementById('network-name').textContent = data.network_name || 'Unknown Network';
                document.getElementById('network-details').textContent = `Mode: ${data.network_mode || 'unknown'}`;

                // Wallet Info
                document.getElementById('wallet-address').textContent = formatAddress(data.wallet_address) || 'Not Connected';
                document.getElementById('wallet-balance').textContent = 
                    `ETH: ${formatNumber(data.eth_balance, 6)} | USDC: ${formatNumber(data.usdc_balance, 2)}`;

                // Aave Protocol
                const healthFactor = data.health_factor || 0;
                document.getElementById('health-factor').textContent = 
                    healthFactor > 0 ? formatNumber(healthFactor, 4) : 'No Position';
                document.getElementById('aave-details').textContent = 
                    `Collateral: $${formatNumber(data.total_collateral_usdc, 2)} | Debt: $${formatNumber(data.total_debt_usdc, 2)}`;

                // System Status
                document.getElementById('system-status').textContent = data.success ? 'Operational' : 'Degraded';
                document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();

                // Apply status classes
                const systemStatus = document.getElementById('system-status');
                systemStatus.className = data.success ? 'success' : 'error';

            } catch (error) {
                console.error('Error updating UI:', error);
                showError('UI update failed');
            }
        }

        function showError(message) {
            document.getElementById('network-name').innerHTML = '<span class="error">Error</span>';
            document.getElementById('wallet-address').innerHTML = '<span class="error">Connection Failed</span>';
            document.getElementById('health-factor').innerHTML = '<span class="error">--</span>';
            document.getElementById('system-status').innerHTML = '<span class="error">Error</span>';
            console.error('Dashboard Error:', message);
        }

        function refreshData() {
            fetchData();
        }

        function emergencyStop() {
            if (confirm('Are you sure you want to trigger an emergency stop?')) {
                fetch('/api/emergency_stop', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        reason: 'Manual emergency stop via dashboard'
                    })
                })
                .then(response => response.json())
                .then(data => {
                    alert(data.success ? 'Emergency stop activated!' : 'Failed to activate emergency stop');
                    if (data.success) {
                        refreshData();
                    }
                })
                .catch(error => {
                    console.error('Emergency stop error:', error);
                    alert('Error activating emergency stop');
                });
            }
        }

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Dashboard loaded, fetching initial data...');
            fetchData();

            // Auto-refresh every 30 seconds
            updateInterval = setInterval(fetchData, 30000);
        });

        // Test API connectivity
        fetch('/api/test')
            .then(response => response.json())
            .then(data => {
                console.log('API test successful:', data);
            })
            .catch(error => {
                console.error('API test failed:', error);
            });
    </script>
</body>
</html>
